  <body>
   <nav>
        <a href="index.html"><h1>Athena</h1></a>
        <div id="navigation" style="display:none;">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a class="active-link" href="#join-top">Join</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="gallery.html">Gallery</a></li>

            </ul>

        </div>
        <div id="mobile-nav-toggle">
            <i class="fa-solid fa-bars" onclick="toggleNav()"></i>    
        </div>
    </nav>
    <header id="join-top">
      <div id="header-title">
        <h1>Join the Team.</h1>
        <p>
          Are you passionate about innovation and want to be part of a dynamic
          team?
        </p>
        <p>
          Fill out the form below and we'll get back to you within 24 hours.
        </p>
      </div>
    </header>
    <main>
      <section id="contact-form-section">
        <form action="contact-success.html" method="post">
          <input
            type="email"
            name="email"
            placeholder="Email Address"
            required
            aria-required="true"
          />
          <input
            type="text"
            name="name"
            placeholder="Name"
            required
            aria-required="true"
          />
          <label id="file-upload-label" for="cv-upload">Upload CV</label>
          <input
            type="file"
            name="cv"
            id="cv-upload"
            placeholder="Upload cv"
            accept=".pdf,.doc,.docx"
            required
            aria-required="true"
          />
          <textarea
            name="contact-content"
            placeholder="What would you like to say?"
            required
            aria-required="true"
          ></textarea>
          <input type="submit" value="Send" />
        </form>
      </section>
    </main>

    <footer>
      <div id="footer-content">
        <div id="social-links-holder">
          <a href="https://www.x.com" target="_blank"
            ><img
              id="x-logo"
              src="assets/images/social-logos/x-logo.svg"
              width="20px"
          /></a>
          <a href="https://www.instagram.com" target="_blank"
            ><img
              id="instagram-logo"
              src="assets/images/social-logos/instagram-logo.svg"
              width="30px"
          /></a>
        </div>
        <div id="footer-links">
          <ul>
            <li><a href="">Careers</a></li>
            <li><a href="">Contact</a></li>
          </ul>
        </div>
        <div id="copyright-holder">
          <p>©Project Athena 2026</p>
        </div>
      </div>
    </footer>
  </body>
</html>
